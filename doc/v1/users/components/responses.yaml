  description: Update user success
  content:
    application/json:
      schema:
        type: object
        properties:
          id:
            $ref: "./schemas.yaml#/UserID"
DeleteUser:
  description: Delete user success
  content:
    application/json:
      schema:
        type: object
        properties:
          id:
            $ref: "./schemas.yaml#/UserID"
