# v1/users/components/responses.yaml
CreateUser:
  description: Create user success
  content:
    application/json:
      schema:
        type: object
        properties:
          id:
            $ref: "./schemas.yaml#/UserID"
ListUser:
  description: List user success
  content:
    application/json:
      schema:
        type: array
        items:
          $ref: "./schemas.yaml#/User"
GetUserByID:
  description: Get user by id success
  content:
    application/json:
      schema:
        $ref: "./schemas.yaml#/User"
